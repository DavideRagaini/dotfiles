# ======================= Settings ======================= {{{
include "../module/waybar.conf"
font pango: IosevkaTermSlab Nerd Font Bold 12
default_orientation auto
xwayland enable
# floating_minimum_size 1280 x 720
# floating_maximum_size 1920 x 1080
# }}}
# ======================= Variables ======================= {{{
set {
    $output_laptop           'BOE 0x0B76 Unknown'

    $output_home_primary     'LG Electronics LG Ultra HD 0x000641E4'
    $output_home_vertical    'BNQ BenQ GW2470 7AG00620019'
    $output_home_secondary   'LG Electronics 2D FHD LG TV 0x01010101'

    $output_work_primary     'LG Electronics LG FHD 0x000412A6'
    $output_work_vertical    'LG Electronics LG FHD 0x0004134D'
    $output_work_secondary   'BNQ BenQ BL2381T D3M0091801Q'

    $EDITOR2    $term -T 'temacs' -e emacsclient -nw
    $EDITOR     emacsclient -c
    $BROSWER    "$BROWSER"

    $wph "${XDG_DATA_HOME:-$HOME/.local/share}/mainbg"
    $wpv "${XDG_DATA_HOME:-$HOME/.local/share}/mainbg"
}
# }}}
# ======================= Outputs ======================= {{{
output * bg $wph fill

output $output_laptop {
    scale 1.25
}

# output $output_home_laptop {
#     pos 0 2160
#     scale 1.25
# }

output $output_home_primary {
    pos 1920 1080
    scale 2
}

output $output_home_vertical {
    pos 3840 1080
    transform 90
    # bg $wpv fill
}

output $output_home_secondary {
    pos 1920 0
}

# output $output_work_laptop {
#     pos 1080 1080
#     transform 180
#     scale 1.25
# }

output $output_work_primary {
    pos 1080 0
    transform 180
}

output $output_work_vertical {
    pos 0 0
    transform 270
    # bg $wpv fill
}

output $output_work_secondary {
    pos 3000 0
}
# }}}
# ======================= Multi-Monitor ======================= {{{
mode "display" {
    bindsym {
        1                output $output_primary pos 0,0
        2                output $output_primary pos 0,0; output $output_secnodary_vert pos 3840 30 transform 90
        3                output $output_secondary_standalone
        m                exec toggle-screens mono
        d                exec toggle-screens dual
        Return           mode "default"
        Escape           mode "default"
    }
}

workspace {
    1 output $output_work_primary
    2 output $output_work_primary
    3 output $output_work_primary
    4 output $output_work_primary
    5 output $output_work_primary
    6 output $output_work_primary
    7 output $output_work_primary
    8 output $output_work_primary
    9 output $output_work_primary

    0 output $output_work_primary
    1 output $output_home_primary
    2 output $output_home_primary
    3 output $output_home_primary
    4 output $output_home_primary
    5 output $output_home_primary
    6 output $output_home_primary
    7 output $output_home_primary
    8 output $output_home_primary
    9 output $output_home_primary
    0 output $output_home_primary

    10 output $output_work_secondary
    11 output $output_work_secondary
    12 output $output_work_secondary
    13 output $output_work_secondary
    14 output $output_work_secondary

    10 output $output_home_vertical
    11 output $output_home_vertical
    12 output $output_home_vertical
    13 output $output_home_vertical
    14 output $output_home_vertical

    15 output $output_work_vertical
    16 output $output_work_vertical
    17 output $output_work_vertical
    18 output $output_work_vertical
    19 output $output_work_vertical

    15 output $output_home_secondary
    16 output $output_home_secondary
    17 output $output_home_secondary
    18 output $output_home_secondary
    19 output $output_home_secondary

    20 output $output_laptop
    21 output $output_laptop
    22 output $output_laptop
    23 output $output_laptop
    24 output $output_laptop
}
# }}}
# ======================= Autostart ======================= {{{
exec {
    dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway

    always-autostart 10
    work-autostart 30
}
# }}}
